<!DOCTYPE html>
<html lang="vi" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhung Nguyen - Portfolio Main Page</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        deepNavy: '#0F172A',
                        lightNavy: '#1E293B',
                        premiumGold: '#D4AF37',
                    },
                    fontFamily: {
                        // Ưu tiên Montserrat cho tiêu đề, Inter cho nội dung để đảm bảo tiếng Việt đẹp nhất
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                        heading: ['Montserrat', 'ui-sans-serif', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        /* Nhúng font chữ tối ưu cho tiếng Việt */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@400;600;800&display=swap');
        
        @media (min-width: 1024px) {
            html, body {
                overflow: hidden;
                height: 100%;
            }
        }

        .gold-glow {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .gold-glow:hover {
            color: #D4AF37;
            text-shadow: 0 0 12px rgba(212, 175, 55, 0.35);
            border-color: #D4AF37;
        }

        .shine-frame::after {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.13) 50%, rgba(255, 255, 255, 0) 100%);
            transform: skewX(-25deg);
            transition: 0.75s;
        }
        .shine-frame:hover::after {
            left: 150%;
        }
    </style>
</head>
<body class="bg-deepNavy text-slate-100 font-sans min-h-full flex flex-col justify-between relative overflow-x-hidden">

    <div class="absolute inset-0 z-0 bg-gradient-to-br from-deepNavy via-[#111c35] to-deepNavy opacity-70 pointer-events-none"></div>

    <header class="w-full max-w-[90rem] mx-auto px-6 md:px-12 py-5 flex justify-between items-center z-10 relative">
        <div class="flex items-center space-x-3">
            <span class="text-xs uppercase tracking-[0.3em] text-slate-400 font-light">STRATEGIC PARTNER</span>
            <div class="h-[1px] w-8 bg-premiumGold/50"></div>
            <span class="text-sm font-semibold tracking-wider text-white">NN</span>
        </div>

        <button id="lang-toggle" onclick="toggleLanguage()" class="group flex items-center space-x-2 bg-lightNavy/50 hover:bg-lightNavy/80 border border-slate-700/60 hover:border-premiumGold px-4 py-1.5 rounded-full text-xs font-medium tracking-wider transition-all duration-300 backdrop-blur-md">
            <i data-lucide="globe" class="w-3.5 h-3.5 text-premiumGold transition-transform group-hover:rotate-12"></i>
            <span id="lang-text" class="text-slate-300 group-hover:text-white">English</span>
        </button>
    </header>

    <main class="w-full max-w-[90rem] mx-auto px-6 md:px-12 flex-grow flex items-center justify-center z-10 relative py-4 lg:py-0">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-12 items-center w-full">
            
            <div class="lg:col-span-6 flex justify-center w-full h-full">
                <div class="shine-frame relative w-full aspect-[16/10] lg:aspect-[1.4/1] rounded-2xl overflow-hidden border border-premiumGold/40 hover:border-premiumGold shadow-[0_0_50px_rgba(0,0,0,0.7)] group transition-all duration-500 bg-lightNavy/20 flex items-center justify-center">
                    <img id="hero-image" src="./main-picture.png" alt="Nhung Nguyen" class="w-full h-full object-cover transition-transform duration-700 ease-out group-hover:scale-[1.03] hidden" onload="this.classList.remove('hidden')" onerror="handleImageLoadError(this)"/>
                    <div id="image-fallback" class="absolute inset-0 flex flex-col items-center justify-center p-6 text-center bg-gradient-to-br from-lightNavy/60 to-deepNavy/90 border border-slate-800 rounded-2xl">
                        <i data-lucide="image" class="w-12 h-12 text-premiumGold/50 mb-4"></i>
                        <p class="text-xs text-slate-400">Vui lòng cập nhật link ảnh</p>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-6 flex flex-col justify-center space-y-6 w-full">
                <div class="space-y-3">
                    <p id="hero-subtitle" class="text-xs uppercase tracking-[0.4em] text-premiumGold font-semibold font-heading">DỰ ÁN CÁ NHÂN</p>
                    <h1 id="hero-title" class="text-4xl lg:text-6xl font-extrabold tracking-tight text-white leading-none font-heading">
                        NHUNG NGUYEN
                    </h1>
                    <p id="hero-desc" class="text-sm text-slate-400 font-light max-w-xl leading-relaxed">
                        Nơi giao thoa giữa tư duy phân tích và góc nhìn khám phá thế giới.
                    </p>
                </div>

                <nav class="flex flex-col space-y-2.5 w-full">
                    <a href="#about" class="gold-glow group flex items-center justify-between p-3.5 bg-lightNavy/40 hover:bg-lightNavy/70 border border-slate-800 rounded-xl transition-all duration-300">
                        <span class="text-sm font-medium tracking-wide text-slate-200" id="menu-about">VỀ TÔI</span>
                        <i data-lucide="arrow-up-right" class="w-4 h-4 text-slate-500"></i>
                    </a>
                    <a href="#travel" class="gold-glow group flex items-center justify-between p-3.5 bg-lightNavy/40 hover:bg-lightNavy/70 border border-slate-800 rounded-xl transition-all duration-300">
                        <span class="text-sm font-medium tracking-wide text-slate-200" id="menu-travel">CÂU CHUYỆN NHỮNG CHUYẾN ĐI</span>
                        <i data-lucide="arrow-up-right" class="w-4 h-4 text-slate-500"></i>
                    </a>
                    <a href="#experience" class="gold-glow group flex items-center justify-between p-3.5 bg-lightNavy/40 hover:bg-lightNavy/70 border border-slate-800 rounded-xl transition-all duration-300">
                        <span class="text-sm font-medium tracking-wide text-slate-200" id="menu-experience">CHIA SẺ KINH NGHIỆM</span>
                        <i data-lucide="arrow-up-right" class="w-4 h-4 text-slate-500"></i>
                    </a>
                    <a href="#services" class="gold-glow group flex items-center justify-between p-3.5 bg-lightNavy/40 hover:bg-lightNavy/70 border border-slate-800 rounded-xl transition-all duration-300">
                        <span class="text-sm font-medium tracking-wide text-slate-200" id="menu-services">DỊCH VỤ & HỢP TÁC</span>
                        <i data-lucide="arrow-up-right" class="w-4 h-4 text-slate-500"></i>
                    </a>
                    <a href="#contact" class="gold-glow group flex items-center justify-between p-3.5 bg-lightNavy/40 hover:bg-lightNavy/70 border border-slate-800 rounded-xl transition-all duration-300">
                        <span class="text-sm font-medium tracking-wide text-slate-200" id="menu-contact">LIÊN HỆ</span>
                        <i data-lucide="arrow-up-right" class="w-4 h-4 text-slate-500"></i>
                    </a>
                </nav>
            </div>
        </div>
    </main>

    <footer class="w-full max-w-[90rem] mx-auto px-6 md:px-12 py-5 text-xs text-slate-500 z-10 relative">
        <p id="footer-copyright">&copy; 2026 Nhung Nguyen. Tất cả quyền lợi được bảo lưu.</p>
    </footer>

    <script>
        lucide.createIcons();
        let currentLang = 'VI';
        const dictionary = {
            VI: {
                langText: "English", heroSubtitle: "DỰ ÁN CÁ NHÂN", heroTitle: "Nguyễn Việt Thùy Nhung", 
                heroDesc: "Nơi giao thoa giữa tư duy phân tích và góc nhìn khám phá thế giới.",
                menuAbout: "VỀ TÔI", menuTravel: "CÂU CHUYỆN NHỮNG CHUYẾN ĐI", menuExperience: "CHIA SẺ KINH NGHIỆM", 
                menuServices: "DỊCH VỤ & HỢP TÁC", menuContact: "LIÊN HỆ", footerCopyright: "&copy; 2026 Nhung Nguyen. Tất cả quyền lợi được bảo lưu."
            },
            EN: {
                langText: "Tiếng Việt", heroSubtitle: "PERSONAL PROJECT", heroTitle: "NHUNG NGUYEN", 
                heroDesc: "The intersection of analytical thinking and a free world-explorer perspective.",
                menuAbout: "ABOUT ME", menuTravel: "TRAVEL STORIES", menuExperience: "INSIGHTS & EXPERIENCES", 
                menuServices: "SERVICES & COOPERATION", menuContact: "CONTACT", footerCopyright: "&copy; 2026 Nhung Nguyen. All rights reserved."
            }
        };

        function toggleLanguage() {
            currentLang = currentLang === 'VI' ? 'EN' : 'VI';
            const data = dictionary[currentLang];
            document.getElementById('lang-text').innerText = data.langText;
            document.getElementById('hero-subtitle').innerText = data.heroSubtitle;
            document.getElementById('hero-title').innerText = data.heroTitle;
            document.getElementById('hero-desc').innerText = data.heroDesc;
            document.getElementById('menu-about').innerText = data.menuAbout;
            document.getElementById('menu-travel').innerText = data.menuTravel;
            document.getElementById('menu-experience').innerText = data.menuExperience;
            document.getElementById('menu-services').innerText = data.menuServices;
            document.getElementById('menu-contact').innerText = data.menuContact;
            document.getElementById('footer-copyright').innerHTML = data.footerCopyright;
        }

        function handleImageLoadError(img) {
            img.classList.add('hidden');
            document.getElementById('image-fallback').classList.remove('hidden');
        }
    </script>
</body>
</html>
