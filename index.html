<!DOCTYPE html>
<html lang="vi" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhung Nguyen - Portfolio Main Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        deepNavy: '#0F172A',
                        lightNavy: '#1E293B',
                        premiumGold: '#D4AF37',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Montserrat', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Montserrat:wght@600;800&display=swap');
    </style>
</head>
<body class="bg-deepNavy text-slate-100 font-sans min-h-screen flex flex-col">

    <!-- Header: Responsive alignment -->
    <header class="w-full max-w-[90rem] mx-auto px-6 py-6 flex justify-end z-10">
        <button id="lang-toggle" onclick="toggleLanguage()" class="flex items-center space-x-2 bg-lightNavy/50 hover:bg-lightNavy/80 border border-slate-700 px-4 py-1.5 rounded-full text-xs font-medium transition-all">
            <i data-lucide="globe" class="w-3.5 h-3.5 text-premiumGold"></i>
            <span id="lang-text" class="text-slate-300">English</span>
        </button>
    </header>

    <!-- Main Content: Responsive Grid -->
    <main class="flex-grow flex items-center justify-center p-6 lg:p-12">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-12 w-full max-w-[90rem] items-center">
            
            <!-- Image Column: Điều chỉnh linh hoạt để ảnh lấp đầy khung hình -->
            <div class="lg:col-span-6 w-full flex items-center justify-center">
                <div class="w-full h-auto overflow-hidden rounded-2xl shadow-2xl">
                    <img src="https://nhungnvt.github.io/personal-project/main-picture.png" 
                         alt="Nhung Nguyen" 
                         class="w-full h-full object-cover block">
                </div>
            </div>

            <!-- Text/Nav Column: Responsive spacing -->
            <div class="lg:col-span-6 space-y-6">
                <h1 id="hero-title" class="text-3xl md:text-5xl font-extrabold text-white font-heading leading-tight">Nguyễn Việt Thùy Nhung</h1>
                <p id="hero-desc" class="text-sm md:text-base text-slate-400">Nơi giao thoa giữa tư duy phân tích và góc nhìn khám phá thế giới.</p>
                
                <nav class="flex flex-col space-y-3">
                    <a href="#about" id="menu-about" class="p-3 md:p-4 bg-lightNavy/30 border border-slate-700 rounded-lg hover:border-premiumGold transition-all text-sm md:text-base">VỀ TÔI</a>
                    <a href="#travel" id="menu-travel" class="p-3 md:p-4 bg-lightNavy/30 border border-slate-700 rounded-lg hover:border-premiumGold transition-all text-sm md:text-base">CÂU CHUYỆN NHỮNG CHUYẾN ĐI</a>
                    <a href="#experience" id="menu-experience" class="p-3 md:p-4 bg-lightNavy/30 border border-slate-700 rounded-lg hover:border-premiumGold transition-all text-sm md:text-base">CHIA SẺ KINH NGHIỆM</a>
                    <a href="#services" id="menu-services" class="p-3 md:p-4 bg-lightNavy/30 border border-slate-700 rounded-lg hover:border-premiumGold transition-all text-sm md:text-base">DỊCH VỤ & HỢP TÁC</a>
                    <a href="#contact" id="menu-contact" class="p-3 md:p-4 bg-lightNavy/30 border border-slate-700 rounded-lg hover:border-premiumGold transition-all text-sm md:text-base">LIÊN HỆ</a>
                </nav>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        let currentLang = 'VI';
        const dict = {
            VI: { lang: "English", title: "Nguyễn Việt Thùy Nhung", desc: "Nơi giao thoa giữa tư duy phân tích và góc nhìn khám phá thế giới.", m1: "VỀ TÔI", m2: "CÂU CHUYỆN NHỮNG CHUYẾN ĐI", m3: "CHIA SẺ KINH NGHIỆM", m4: "DỊCH VỤ & HỢP TÁC", m5: "LIÊN HỆ" },
            EN: { lang: "Tiếng Việt", title: "Nhung Nguyen", desc: "The intersection of analytical thinking and a free world-explorer perspective.", m1: "ABOUT ME", m2: "TRAVEL STORIES", m3: "INSIGHTS & EXPERIENCES", m4: "SERVICES & COOPERATION", m5: "CONTACT" }
        };

        function toggleLanguage() {
            currentLang = currentLang === 'VI' ? 'EN' : 'VI';
            const d = dict[currentLang];
            document.getElementById('lang-text').innerText = d.lang;
            document.getElementById('hero-title').innerText = d.title;
            document.getElementById('hero-desc').innerText = d.desc;
            document.getElementById('menu-about').innerText = d.m1;
            document.getElementById('menu-travel').innerText = d.m2;
            document.getElementById('menu-experience').innerText = d.m3;
            document.getElementById('menu-services').innerText = d.m4;
            document.getElementById('menu-contact').innerText = d.m5;
        }
    </script>
</body>
</html>
